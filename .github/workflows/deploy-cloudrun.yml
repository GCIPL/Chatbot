name: Deploy Assistant to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  GCP_PROJECT_ID: your-gcp-project-id
  CLOUD_RUN_SERVICE: ghorahi-assistant
  CLOUD_RUN_REGION: asia-south1

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up gcloud auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Configure Docker for gcloud
        run: gcloud auth configure-docker --quiet

      - name: Build container image
        run: |
          IMAGE=gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:$(git rev-parse --short HEAD)
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          gcloud builds submit --tag "$IMAGE" .

      - name: Deploy to Cloud Run (single service)
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --platform managed \
            --region "${{ env.CLOUD_RUN_REGION }}" \
            --allow-unauthenticated

